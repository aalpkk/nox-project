name: HW OB/OS Multi-TF — Daily Refresh + Scan

# Tek-shot günlük zincir (BIST iş günü, 18:00 TR kapanışı sonrası):
#   1. extfeed master cache restore → delta_pull (son 4 gün, 17:00 bar dahil)
#   2. tools/hw_obos_scan.py — 5h/1d/1w/1mo HW big-dot AL_OS / SAT_OB
#      turning point event log (607 universe). Trailing unclosed bars
#      filtered out (no repaint).
#   3. tools/hw_obos_html.py → output/hw_obos_scan_latest.html (4-TF index)
#   4. HTML → GitHub Pages (hw_obos_scan.html)
#   5. Telegram bildirimi (latest bar AL/SAT count + ticker listesi per TF)
#
# Cron: 18:10 + 18:30 TR (15:10/15:30 UTC) hafta içi — 5h afternoon bar
# 14:00-18:00 + günlük 1d bar kapandıktan sonra. Concurrency group +
# idempotent push duplicate fires'ı emer.
#
# NOTE: descriptive scanner. Pre-registered backtest hwo_mtf_v1
# CLOSED_REJECTED — bu çıktı trade-edge iddiası taşımaz.

on:
  schedule:
    - cron: '10 15 * * 1-5'
    - cron: '30 15 * * 1-5'
  workflow_dispatch:
    inputs:
      asof:
        description: 'As-of date YYYY-MM-DD (boş = son bar tarihi).'
        required: false
        default: ''
      tfs:
        description: 'Boşluk-ayrılmış TF listesi (default: hepsi).'
        required: false
        default: '5h 1d 1w 1mo'
      full_pull:
        description: 'extfeed full bulk pull (slow ~40 dk, genelde false).'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

concurrency:
  group: hw-obos-multi-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Resolve as-of date
        id: resolve_date
        run: |
          if [ -n "${{ github.event.inputs.asof }}" ]; then
            DATE="${{ github.event.inputs.asof }}"
          else
            DATE=$(TZ='Europe/Istanbul' date +%Y-%m-%d)
          fi
          TFS="${{ github.event.inputs.tfs }}"
          if [ -z "$TFS" ]; then TFS="5h 1d 1w 1mo"; fi
          echo "asof=$DATE" >> $GITHUB_OUTPUT
          echo "tfs=$TFS" >> $GITHUB_OUTPUT
          echo "As-of date: $DATE  TFs: $TFS"

      - name: Restore extfeed master cache
        uses: actions/cache@v4
        with:
          path: output/extfeed_intraday_1h_3y_master.parquet
          key: extfeed-master-1h-${{ steps.resolve_date.outputs.asof }}
          restore-keys: |
            extfeed-master-1h-

      - name: Optional full bulk pull
        if: ${{ github.event.inputs.full_pull == 'true' }}
        env:
          INTRADAY_SID: ${{ secrets.INTRADAY_SID }}
          INTRADAY_SIGN: ${{ secrets.INTRADAY_SIGN }}
          INTRADAY_HOST: ${{ secrets.INTRADAY_HOST }}
          INTRADAY_WS_URL: ${{ secrets.INTRADAY_WS_URL }}
        run: |
          set -o pipefail
          python tools/extfeed_phase1_bulk.py --force 2>&1 | tail -200

      - name: Delta-pull last 4 days (incremental)
        env:
          INTRADAY_SID: ${{ secrets.INTRADAY_SID }}
          INTRADAY_SIGN: ${{ secrets.INTRADAY_SIGN }}
          INTRADAY_HOST: ${{ secrets.INTRADAY_HOST }}
          INTRADAY_WS_URL: ${{ secrets.INTRADAY_WS_URL }}
        run: |
          set -o pipefail
          python tools/extfeed_delta_pull.py 2>&1 | tail -100

      - name: Run hw_obos multi-TF scanner
        run: |
          set -o pipefail
          python -m tools.hw_obos_scan \
            --asof "${{ steps.resolve_date.outputs.asof }}" \
            --tfs ${{ steps.resolve_date.outputs.tfs }} \
            2>&1 | tee hw_obos_scan.txt | tail -80

      - name: Build HTML report
        run: |
          set -o pipefail
          python -m tools.hw_obos_html \
            --asof "${{ steps.resolve_date.outputs.asof }}" \
            --tfs ${{ steps.resolve_date.outputs.tfs }} \
            --also-latest \
            2>&1 | tee hw_obos_html.txt

      - name: Push HTML to GitHub Pages
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
        run: |
          if [ -z "$GH_TOKEN" ] || [ -z "$GH_PAGES_REPO" ]; then
            echo "  ⚠ GH_TOKEN / GH_PAGES_REPO yok — Pages push atlandı"
            exit 0
          fi
          python - <<'PYEOF'
          import os, pathlib, sys
          sys.path.insert(0, os.getcwd())
          from core.reports import push_html_to_github
          html = pathlib.Path("output/hw_obos_scan_latest.html").read_text(encoding="utf-8")
          url = push_html_to_github(html, "hw_obos_scan.html", "hw-obos-multi-latest")
          print(f"  ✓ published: {url}")
          PYEOF

      - name: Telegram notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
        run: |
          python - <<'PYEOF'
          import os, json, sys, pathlib, re, html as h, requests

          asof = "${{ steps.resolve_date.outputs.asof }}"
          repo = os.environ.get("GH_PAGES_REPO", "")
          page_url = ""
          if repo:
              owner, name = repo.split("/")
              page_url = f"https://{owner}.github.io/{name}/hw_obos_scan.html"

          html_path = pathlib.Path("output/hw_obos_scan_latest.html")
          data = {}
          if html_path.exists():
              raw = html_path.read_text(encoding="utf-8")
              m = re.search(r'<script id="hw-obos-data"[^>]*>(.*?)</script>', raw, re.S)
              if m:
                  try:
                      data = json.loads(m.group(1))
                  except Exception:
                      data = {}

          tf_summaries = data.get("tf_summaries", {})
          grand_total = data.get("grand_total", 0)
          grand_latest = data.get("grand_latest", 0)
          tfs = data.get("tfs", ["5h", "1d", "1w", "1mo"])

          tf_label = {"5h": "5h", "1d": "1d", "1w": "1w", "1mo": "1mo"}

          def _fmt_list(tickers, cap=8):
              if not tickers:
                  return "—"
              shown = tickers[:cap]
              extra = len(tickers) - len(shown)
              s = ", ".join(h.escape(t) for t in shown)
              if extra > 0:
                  s += f" <i>(+{extra})</i>"
              return s

          body = [
              f"📡 <b>HW OB/OS Multi-TF</b> · {asof}",
              "",
              f"Son bar fire: <b>{grand_latest}</b> · pencere toplam: <b>{grand_total}</b>",
          ]
          for tf in tfs:
              s = tf_summaries.get(tf, {})
              if not s:
                  continue
              n_lat = s.get("n_latest", 0)
              n_al = s.get("n_latest_al", 0)
              n_sat = s.get("n_latest_sat", 0)
              bar = s.get("latest_bar", "—")
              body += ["", f"<b>{tf_label.get(tf, tf)}</b> · son bar {h.escape(bar)} · "
                       f"AL <b>{n_al}</b> / SAT <b>{n_sat}</b>"]
              al_t = s.get("latest_al_tickers", [])
              sat_t = s.get("latest_sat_tickers", [])
              if al_t:
                  body.append(f"  🟢 {_fmt_list(al_t)}")
              if sat_t:
                  body.append(f"  🔴 {_fmt_list(sat_t)}")
              if not al_t and not sat_t:
                  body.append("  —")
          if page_url:
              body += ["", f'<a href="{page_url}">📰 HTML rapor</a>']
          body += ["", "⚠️ Descriptive scanner · NOT live · trade-edge iddiası YOK"]
          msg = "\n".join(body)

          token = os.environ.get("TG_BOT_TOKEN", "")
          chat_id = os.environ.get("TG_CHAT_ID", "")
          if token and chat_id:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "text": msg[:4096],
                        "parse_mode": "HTML", "disable_web_page_preview": True},
              )
              print(f"  Telegram: {r.status_code}")
          else:
              print("  ℹ TG creds yok, mesaj:")
              print(msg)
          PYEOF

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hw-obos-${{ steps.resolve_date.outputs.asof }}-${{ github.run_number }}
          path: |
            hw_obos_scan.txt
            hw_obos_html.txt
            output/hw_obos_*_scan_*.csv
            output/hw_obos_scan_*.html
          if-no-files-found: warn
          retention-days: 14
