name: Triangle Break — Daily Refresh + Scan

# Tek-shot günlük zincir (BIST iş günü, 18:00 TR kapanışı sonrası):
#   1. master-data-pull close artifact restore (manifest + extfeed master);
#      manifest verifier fail-fast — local extfeed pull YOK
#   2. tools/triangle_break_scan_live.py — TRIANGLE_BREAK 0.3
#      ATR-relative containment (k=0.30 plateau midpoint, floor 0.4% / cap 2.0%).
#      4 family parquet: triangle_break_tr_{5h,1d,1w,1M}.parquet
#   3. tools/triangle_break_html.py → output/triangle_break_scan_latest.html
#      (per-TF + index briefing, JSON marker id="triangle-break-data")
#   4. HTML index → GitHub Pages (triangle_break_scan.html)
#   5. Telegram bildirimi (tier-A roster + per-TF trigger sayısı)
#
# Cron: 18:35 TR (15:35 UTC) hafta içi — horizontal_base scan'den 5 dk sonra
# (concurrency offset). BIST kapanış + buffer.
#
# Veri kaynağı: master-data-pull.yml (close mode) — bu workflow kendi
# extfeed/yfinance pull'unu YAPMAZ. Restore başarısızsa fail-fast;
# fallback YOK. Merkezi mimarinin garantisi: tek veri kaynağı.
#
# NOTE: descriptive scanner. Trade-edge iddiası YOK. Tier-A = ≥3 H + ≥3 L
# containment touch (ATR-relative band). v0.3 schema bump (`memory/
# triangle_break_v0_3_atr_tolerance.md`); k≥0.35 değişiklikleri pre-reg
# backtest gerektirir, otomatik tweak YOK.

on:
  schedule:
    - cron: '35 15 * * 1-5'
  workflow_dispatch:
    inputs:
      asof:
        description: 'As-of date YYYY-MM-DD (boş = son bar tarihi).'
        required: false
        default: ''

permissions:
  contents: write
  actions: read

concurrency:
  group: triangle-break-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Resolve as-of date
        id: resolve_date
        run: |
          if [ -n "${{ github.event.inputs.asof }}" ]; then
            DATE="${{ github.event.inputs.asof }}"
          else
            DATE=$(python -c "from tools.master_data_pull_orchestrator import compute_operational_target_date; print(compute_operational_target_date().isoformat())")
          fi
          echo "asof=$DATE" >> $GITHUB_OUTPUT
          echo "As-of date: $DATE"

      - name: Select latest close-mode master-data-pull run on main
        id: select_master_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Walk back through recent successful master-data-pull runs on main
          # and pick the first whose manifest reports mode=close, verdict=PASS,
          # freshness_status=PASS. Blocks PR-1c-era regression where the
          # downloader returned the latest *any-mode* successful run
          # (intraday_1700 after 2026-05-11), making the mode==close verifier
          # hard-FAIL on scheduled producer fires.
          candidates=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=master-data-pull.yml \
            --branch=main \
            --status=success \
            --limit 30 \
            --json databaseId \
            --jq '.[].databaseId')
          if [ -z "$candidates" ]; then
            echo "::error::no successful master-data-pull runs on main"; exit 1
          fi
          selected=""
          for run_id in $candidates; do
            tmp=$(mktemp -d)
            if gh run download "$run_id" --repo "${{ github.repository }}" -n master-data-manifest -D "$tmp" >/dev/null 2>&1; then
              mf="$tmp/master_data_manifest.json"
              if [ -f "$mf" ]; then
                ok=$(python -c "import json; m=json.load(open('$mf')); print('yes' if (m.get('mode')=='close' and m.get('verdict')=='PASS' and m.get('freshness_status')=='PASS') else 'no')")
                if [ "$ok" = "yes" ]; then
                  selected="$run_id"
                  rm -rf "$tmp"
                  break
                fi
                echo "  skip run $run_id (mode/verdict/freshness mismatch)"
              fi
            else
              echo "  skip run $run_id (manifest artifact missing or expired)"
            fi
            rm -rf "$tmp"
          done
          if [ -z "$selected" ]; then
            echo "::error::no close-mode master-data-pull run with PASS verdict in last 30 successful runs"
            exit 1
          fi
          echo "selected close-mode master-data-pull run: $selected"
          echo "run_id=$selected" >> "$GITHUB_OUTPUT"

      - name: Restore master-data-pull manifest (selected close run)
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ steps.select_master_run.outputs.run_id }}
          name: master-data-manifest
          path: output/
          if_no_artifact_found: fail

      - name: Restore master-data-pull extfeed parquet (selected close run)
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ steps.select_master_run.outputs.run_id }}
          name: master-extfeed-intraday-1h
          path: output/
          if_no_artifact_found: fail

      - name: Verify master-data-pull manifest + extfeed integrity (fail-fast, no fallback)
        env:
          ASOF: ${{ steps.resolve_date.outputs.asof }}
        run: |
          set -o pipefail
          python - <<'PYEOF'
          import datetime as dt
          import hashlib
          import json
          import os
          import pathlib
          import sys

          import pandas as pd
          import pyarrow.parquet as pq

          ROOT = pathlib.Path("output")
          MANIFEST = ROOT / "master_data_manifest.json"
          EXTFEED = ROOT / "extfeed_intraday_1h_3y_master.parquet"

          if not MANIFEST.exists():
              sys.exit("FAIL: master_data_manifest.json missing after restore")
          if not EXTFEED.exists():
              sys.exit("FAIL: extfeed_intraday_1h_3y_master.parquet missing after restore")

          m = json.loads(MANIFEST.read_text())

          # Verdict / mode / freshness gates
          if m.get("verdict") != "PASS":
              sys.exit(f"FAIL: manifest verdict={m.get('verdict')} failures={m.get('failures')}")
          if m.get("freshness_status") != "PASS":
              sys.exit(f"FAIL: manifest freshness_status={m.get('freshness_status')}")
          if m.get("mode") != "close":
              sys.exit(f"FAIL: manifest mode={m.get('mode')} != close")

          ext_post = (m.get("extfeed") or {}).get("post") or {}
          if not ext_post.get("exists"):
              sys.exit("FAIL: manifest extfeed.post.exists=false")

          # sha256 integrity (recompute on downloaded file)
          h = hashlib.sha256()
          with EXTFEED.open("rb") as f:
              for chunk in iter(lambda: f.read(1 << 20), b""):
                  h.update(chunk)
          got_sha = h.hexdigest()
          want_sha = ext_post.get("sha256")
          if got_sha != want_sha:
              sys.exit(f"FAIL: extfeed sha mismatch (downloaded={got_sha} manifest={want_sha})")

          # row_count match
          got_rows = pq.read_metadata(EXTFEED).num_rows
          want_rows = ext_post.get("row_count")
          if got_rows != want_rows:
              sys.exit(f"FAIL: extfeed row_count mismatch (downloaded={got_rows} manifest={want_rows})")

          # operational_target_date == consumer asof
          asof = dt.date.fromisoformat(os.environ["ASOF"])
          op_str = m.get("operational_target_date")
          if not op_str:
              sys.exit("FAIL: manifest missing operational_target_date")
          op = dt.date.fromisoformat(op_str)
          if op != asof:
              sys.exit(f"FAIL: manifest operational_target_date={op} != consumer asof={asof}")

          # Freshness: extfeed.post.max_ts_utc must reach asof close cutoff (BIST 17:00 TR = 14:00 UTC)
          mts_str = ext_post.get("max_ts_utc")
          if not mts_str:
              sys.exit("FAIL: manifest extfeed.post.max_ts_utc missing")
          mts = pd.Timestamp(mts_str)
          if mts.tzinfo is None:
              mts = mts.tz_localize("UTC")
          cutoff = pd.Timestamp(f"{asof.isoformat()}T14:00:00Z")
          if mts < cutoff:
              sys.exit(f"FAIL: extfeed max_ts_utc={mts.isoformat()} < asof close cutoff {cutoff.isoformat()}")

          print("  master-data restore OK:")
          print(f"    mode={m['mode']} verdict={m['verdict']} freshness={m['freshness_status']}")
          print(f"    operational_target_date={op} asof={asof}")
          print(f"    extfeed rows={got_rows:,} max_ts_utc={mts.isoformat()}")
          print(f"    extfeed sha256={got_sha[:16]}…")
          PYEOF

      - name: Run triangle_break live scanner
        run: |
          set -o pipefail
          python -m tools.triangle_break_scan_live \
            --asof "${{ steps.resolve_date.outputs.asof }}" \
            2>&1 | tee triangle_break_scan.txt | tail -120

      - name: Build HTML report
        run: |
          set -o pipefail
          python -m tools.triangle_break_html \
            --asof "${{ steps.resolve_date.outputs.asof }}" \
            2>&1 | tee triangle_break_html.txt

      - name: Push HTML to GitHub Pages
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
        run: |
          if [ -z "$GH_TOKEN" ] || [ -z "$GH_PAGES_REPO" ]; then
            echo "  ⚠ GH_TOKEN / GH_PAGES_REPO yok — Pages push atlandı"
            exit 0
          fi
          python - <<'PYEOF'
          import os, pathlib, sys
          sys.path.insert(0, os.getcwd())
          from core.reports import push_html_to_github

          # Index links to per-TF pages by `triangle_break_<tf>_latest.html`
          # and per-TF back-links use `triangle_break_scan_latest.html` —
          # publish with the same filenames the HTML already references
          # so cross-navigation works on Pages. Index also published as
          # `triangle_break_scan.html` for backward-compatible bookmark.
          targets = [
              ("output/triangle_break_5h_latest.html",   "triangle_break_5h_latest.html"),
              ("output/triangle_break_1d_latest.html",   "triangle_break_1d_latest.html"),
              ("output/triangle_break_1w_latest.html",   "triangle_break_1w_latest.html"),
              ("output/triangle_break_1mo_latest.html",  "triangle_break_1mo_latest.html"),
              ("output/triangle_break_scan_latest.html", "triangle_break_scan_latest.html"),
              ("output/triangle_break_scan_latest.html", "triangle_break_scan.html"),
          ]
          for src, dst in targets:
              p = pathlib.Path(src)
              if not p.exists():
                  print(f"  ⚠ skip {src} (yok)")
                  continue
              html = p.read_text(encoding="utf-8")
              url = push_html_to_github(html, dst, "triangle-break-latest")
              print(f"  ✓ {dst}: {url}")
          PYEOF

      - name: Telegram notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
        run: |
          python - <<'PYEOF'
          import os, json, sys, pathlib, re, html as h, requests

          asof = "${{ steps.resolve_date.outputs.asof }}"
          repo = os.environ.get("GH_PAGES_REPO", "")
          page_url = ""
          if repo:
              owner, name = repo.split("/")
              page_url = f"https://{owner}.github.io/{name}/triangle_break_scan.html"

          html_path = pathlib.Path("output/triangle_break_scan_latest.html")
          data = {}
          if html_path.exists():
              raw = html_path.read_text(encoding="utf-8")
              m = re.search(r'<script id="triangle-break-data"[^>]*>(.*?)</script>', raw, re.S)
              if m:
                  try:
                      data = json.loads(m.group(1))
                  except Exception:
                      data = {}

          tf_totals = data.get("tf_totals", {})
          tier_a_per_tf = data.get("tier_a_per_tf", {})
          trigger_per_tf = data.get("trigger_per_tf", {})
          subs = data.get("subtype_counts", {})
          stack_count = data.get("stack_count", 0)
          grand = data.get("grand_total", 0)
          n_tier_a = sum(len(v) for v in tier_a_per_tf.values())
          n_trig = sum(len(v) for v in trigger_per_tf.values())

          def _fmt_list(tickers, cap=10):
              if not tickers:
                  return "—"
              shown = tickers[:cap]
              extra = len(tickers) - len(shown)
              s = ", ".join(h.escape(t) for t in shown)
              if extra > 0:
                  s += f" <i>(+{extra})</i>"
              return s

          tf_label = {"5h": "5h", "1d": "1d", "1w": "1w", "1M": "1M"}
          body = [
              f"📐 <b>Triangle Break · LIVE</b> · {asof}",
              "",
              f"N <b>{grand}</b> "
              f"(5h <b>{tf_totals.get('5h',0)}</b> · "
              f"1d <b>{tf_totals.get('1d',0)}</b> · "
              f"1w <b>{tf_totals.get('1w',0)}</b> · "
              f"1M <b>{tf_totals.get('1M',0)}</b>)",
              f"Tier-A <b>{n_tier_a}</b> · trigger <b>{n_trig}</b> · stack ≥2 TF <b>{stack_count}</b>",
          ]
          if subs:
              sub_str = " · ".join(
                  f"{k} <b>{v}</b>" for k, v in subs.items() if v
              )
              body.append(f"Subtypes: {sub_str}")

          if n_tier_a > 0:
              body += ["", "<b>🟡 Tier-A:</b>"]
              for tf in ("5h", "1d", "1w", "1M"):
                  ta = tier_a_per_tf.get(tf, [])
                  if ta:
                      body.append(f"  {tf_label[tf]}: {_fmt_list(ta)}")
          else:
              body += ["", "<i>Tier-A: yok (≥3 H + ≥3 L containment touch)</i>"]

          if n_trig > 0:
              body += ["", "<b>⚡ Trigger:</b>"]
              for tf in ("5h", "1d", "1w", "1M"):
                  tg = trigger_per_tf.get(tf, [])
                  if tg:
                      body.append(f"  {tf_label[tf]}: {_fmt_list(tg)}")

          if page_url:
              body += ["", f'<a href="{page_url}">📰 HTML rapor</a>']
          body += ["", "⚠️ Descriptive scanner · v0.3 ATR-relative containment · trade-edge iddiası YOK"]
          msg = "\n".join(body)

          token = os.environ.get("TG_BOT_TOKEN", "")
          chat_id = os.environ.get("TG_CHAT_ID", "")
          if token and chat_id:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "text": msg[:4096],
                        "parse_mode": "HTML", "disable_web_page_preview": True},
              )
              print(f"  Telegram: {r.status_code}")
          else:
              print("  ℹ TG creds yok, mesaj:")
              print(msg)
          PYEOF

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triangle-break-${{ steps.resolve_date.outputs.asof }}-${{ github.run_number }}
          path: |
            triangle_break_scan.txt
            triangle_break_html.txt
            output/triangle_break_tr_*.parquet
            output/triangle_break_*.html
          if-no-files-found: warn
          retention-days: 14
