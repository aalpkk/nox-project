name: Screener Combo Daily 9-list
on:
  schedule:
    # Pzt-Cuma 18:35 TR (BIST kapanış 18:00 + buffer): 15:35 UTC
    - cron: '35 15 * * 1-5'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Cap universe size (debug)'
        required: false
        default: ''
      asof:
        description: 'Pin asof date (YYYY-MM-DD); blank = latest'
        required: false
        default: ''
      push:
        description: 'Push HTML to gh-pages'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run daily screener_combo
        env:
          INTRADAY_SID: ${{ secrets.INTRADAY_SID }}
          INTRADAY_SIGN: ${{ secrets.INTRADAY_SIGN }}
          INTRADAY_HOST: ${{ secrets.INTRADAY_HOST }}
          INTRADAY_WS_URL: ${{ secrets.INTRADAY_WS_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.asof }}" ]; then
            ARGS="$ARGS --asof ${{ github.event.inputs.asof }}"
          fi
          if [ "${{ github.event.inputs.push }}" != "false" ]; then
            ARGS="$ARGS --push"
          fi
          python tools/screener_combo_daily_live.py $ARGS
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-combo-${{ github.run_number }}
          path: |
            output/screener_combo_v1_live_*.parquet
            output/screener_combo_v1_live_*.csv
            output/screener_combo_v1_live_*.html
            output/_screener_combo_live.log
          if-no-files-found: warn
          retention-days: 30
