name: extfeed smoke
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - stress
          - paginate
          - phase0
          - phase1
          - daily_recon
          - xu100_pull
          - delta_pull
      symbol:
        description: 'Symbol for smoke mode (e.g. BIST:THYAO)'
        required: false
        default: 'BIST:THYAO'
      timeframe:
        description: 'Timeframe (1, 5, 15, 60, 240, D)'
        required: false
        default: '15'
      n_bars:
        description: 'Number of bars'
        required: false
        default: '50'
      n_tickers:
        description: 'Number of tickers (stress mode only)'
        required: false
        default: '30'
      delay_s:
        description: 'Delay between fetches in stress mode (seconds)'
        required: false
        default: '0.3'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run test
        env:
          INTRADAY_SID: ${{ secrets.INTRADAY_SID }}
          INTRADAY_SIGN: ${{ secrets.INTRADAY_SIGN }}
          INTRADAY_HOST: ${{ secrets.INTRADAY_HOST }}
          INTRADAY_WS_URL: ${{ secrets.INTRADAY_WS_URL }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "stress" ]; then
            python tools/extfeed_stress.py \
              "${{ github.event.inputs.timeframe }}" \
              "${{ github.event.inputs.n_bars }}" \
              "${{ github.event.inputs.n_tickers }}" \
              "${{ github.event.inputs.delay_s }}"
          elif [ "${{ github.event.inputs.mode }}" = "paginate" ]; then
            python tools/extfeed_paginate_probe.py \
              "${{ github.event.inputs.symbol }}" \
              "${{ github.event.inputs.timeframe }}" \
              "${{ github.event.inputs.n_bars }}"
          elif [ "${{ github.event.inputs.mode }}" = "phase0" ]; then
            python tools/extfeed_phase0_smoke.py \
              "${{ github.event.inputs.n_tickers }}" \
              "${{ github.event.inputs.timeframe }}" \
              "3"
          elif [ "${{ github.event.inputs.mode }}" = "phase1" ]; then
            python tools/extfeed_phase1_bulk.py
          elif [ "${{ github.event.inputs.mode }}" = "daily_recon" ]; then
            python tools/extfeed_daily_recon.py
          elif [ "${{ github.event.inputs.mode }}" = "xu100_pull" ]; then
            python tools/extfeed_pull_xu100.py
          elif [ "${{ github.event.inputs.mode }}" = "delta_pull" ]; then
            python tools/extfeed_delta_pull.py
          else
            python tools/extfeed_smoke.py \
              "${{ github.event.inputs.symbol }}" \
              "${{ github.event.inputs.timeframe }}" \
              "${{ github.event.inputs.n_bars }}"
          fi
      - name: Upload phase0 artifacts
        if: ${{ github.event.inputs.mode == 'phase0' }}
        uses: actions/upload-artifact@v4
        with:
          name: extfeed-phase0
          path: |
            output/extfeed_phase0_smoke_summary.csv
            output/extfeed_phase0_smoke_bars.parquet
          if-no-files-found: warn
          retention-days: 7
      - name: Upload phase1 artifacts
        if: ${{ github.event.inputs.mode == 'phase1' }}
        uses: actions/upload-artifact@v4
        with:
          name: extfeed-phase1
          path: |
            output/extfeed_intraday_1h_3y_master.parquet
            output/extfeed_intraday_coverage.csv
            output/extfeed_intraday_volume_recon.csv
            output/_extfeed_phase1.log
          if-no-files-found: warn
          retention-days: 30
      - name: Upload xu100_pull artifacts
        if: ${{ github.event.inputs.mode == 'xu100_pull' }}
        uses: actions/upload-artifact@v4
        with:
          name: xu100-extfeed-daily
          path: |
            output/xu100_extfeed_daily.parquet
          if-no-files-found: error
          retention-days: 30

      - name: Upload daily_recon artifacts
        if: ${{ github.event.inputs.mode == 'daily_recon' }}
        uses: actions/upload-artifact@v4
        with:
          name: extfeed-daily-recon
          path: |
            output/extfeed_daily_recon.csv
            output/extfeed_daily_recon_summary.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Upload delta_pull artifacts
        if: ${{ github.event.inputs.mode == 'delta_pull' }}
        uses: actions/upload-artifact@v4
        with:
          name: extfeed-delta-pull
          path: |
            output/extfeed_intraday_1h_3y_master.parquet
          if-no-files-found: error
          retention-days: 30
