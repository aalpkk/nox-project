name: Horizontal Base — Daily Refresh + Scan

# Tek-shot günlük zincir (BIST iş günü, 18:00 TR kapanışı sonrası):
#   1. master-data-pull close artifact restore (manifest + extfeed master);
#      manifest verifier fail-fast — local extfeed pull YOK
#   2. tools/horizontal_base_scan_live.py — V1.4.0/FEATURE 1.3.0
#      horizontal_base events (trigger ∪ retest_bounce ∪ extended) +
#      derived tier (A/B/C) + tradeable flags. 607 universe daily resample.
#   3. tools/horizontal_base_html.py → output/horizontal_base_scan_latest.html
#      (3-tier briefing, JSON marker for Telegram parse)
#   4. HTML → GitHub Pages (horizontal_base_scan.html)
#   5. Telegram bildirimi (tradeable_a / tradeable_ab tickers per tier)
#
# Cron: 18:30 TR (15:30 UTC) hafta içi — master-data-pull 18:05 TR cron'u
# sonrası, BIST kapanış + buffer. Concurrency group + idempotent push
# duplicate fires'ı emer.
#
# Veri kaynağı: master-data-pull.yml (close mode) — bu workflow kendi
# extfeed/yfinance pull'unu YAPMAZ. Restore başarısızsa fail-fast;
# fallback YOK. Merkezi mimarinin garantisi: tek veri kaynağı.
#
# NOTE: descriptive scanner. Pre-registered ML lines v1 + v1_2 REJECTED —
# bu çıktı trade-edge iddiası TAŞIMAZ. Tier ve tradeable bayrak'lar event
# quality diagnostic PF tag'lerinden türetildi (in-sample). Trader tier+
# context kullanarak karar verir; rules-based ranker backtest in-sample
# reference olarak `output/horizontal_base_rules_v1_backtest.md`.

on:
  schedule:
    - cron: '30 15 * * 1-5'
  workflow_dispatch:
    inputs:
      asof:
        description: 'As-of date YYYY-MM-DD (boş = son bar tarihi).'
        required: false
        default: ''

permissions:
  contents: write
  actions: read

concurrency:
  group: horizontal-base-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Resolve as-of date
        id: resolve_date
        run: |
          if [ -n "${{ github.event.inputs.asof }}" ]; then
            DATE="${{ github.event.inputs.asof }}"
          else
            DATE=$(python -c "from tools.master_data_pull_orchestrator import compute_operational_target_date; print(compute_operational_target_date().isoformat())")
          fi
          echo "asof=$DATE" >> $GITHUB_OUTPUT
          echo "As-of date: $DATE"

      - name: Restore master-data-pull manifest (latest successful close run on main)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: master-data-pull.yml
          branch: main
          workflow_conclusion: success
          name: master-data-manifest
          path: output/
          if_no_artifact_found: fail

      - name: Restore master-data-pull extfeed parquet (latest successful close run on main)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: master-data-pull.yml
          branch: main
          workflow_conclusion: success
          name: master-extfeed-intraday-1h
          path: output/
          if_no_artifact_found: fail

      - name: Restore master-data-pull xu100 daily parquet (latest successful close run on main)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: master-data-pull.yml
          branch: main
          workflow_conclusion: success
          name: master-xu100-extfeed-daily
          path: output/
          if_no_artifact_found: fail

      - name: Verify master-data-pull manifest + extfeed + xu100 integrity (fail-fast, no fallback)
        env:
          ASOF: ${{ steps.resolve_date.outputs.asof }}
        run: |
          set -o pipefail
          python - <<'PYEOF'
          import datetime as dt
          import hashlib
          import json
          import os
          import pathlib
          import sys

          import pandas as pd
          import pyarrow.parquet as pq

          ROOT = pathlib.Path("output")
          MANIFEST = ROOT / "master_data_manifest.json"
          EXTFEED = ROOT / "extfeed_intraday_1h_3y_master.parquet"
          XU100 = ROOT / "xu100_extfeed_daily.parquet"

          if not MANIFEST.exists():
              sys.exit("FAIL: master_data_manifest.json missing after restore")
          if not EXTFEED.exists():
              sys.exit("FAIL: extfeed_intraday_1h_3y_master.parquet missing after restore")
          if not XU100.exists():
              sys.exit("FAIL: xu100_extfeed_daily.parquet missing after restore")

          m = json.loads(MANIFEST.read_text())

          # Verdict / mode / freshness gates
          if m.get("verdict") != "PASS":
              sys.exit(f"FAIL: manifest verdict={m.get('verdict')} failures={m.get('failures')}")
          if m.get("freshness_status") != "PASS":
              sys.exit(f"FAIL: manifest freshness_status={m.get('freshness_status')}")
          if m.get("mode") != "close":
              sys.exit(f"FAIL: manifest mode={m.get('mode')} != close")

          ext_post = (m.get("extfeed") or {}).get("post") or {}
          if not ext_post.get("exists"):
              sys.exit("FAIL: manifest extfeed.post.exists=false")

          xu_post = (m.get("xu100") or {}).get("post") or {}
          if not xu_post.get("exists"):
              sys.exit("FAIL: manifest xu100.post.exists=false")

          # sha256 integrity (recompute on downloaded file)
          h = hashlib.sha256()
          with EXTFEED.open("rb") as f:
              for chunk in iter(lambda: f.read(1 << 20), b""):
                  h.update(chunk)
          got_sha = h.hexdigest()
          want_sha = ext_post.get("sha256")
          if got_sha != want_sha:
              sys.exit(f"FAIL: extfeed sha mismatch (downloaded={got_sha} manifest={want_sha})")

          # row_count match
          got_rows = pq.read_metadata(EXTFEED).num_rows
          want_rows = ext_post.get("row_count")
          if got_rows != want_rows:
              sys.exit(f"FAIL: extfeed row_count mismatch (downloaded={got_rows} manifest={want_rows})")

          # operational_target_date == consumer asof
          asof = dt.date.fromisoformat(os.environ["ASOF"])
          op_str = m.get("operational_target_date")
          if not op_str:
              sys.exit("FAIL: manifest missing operational_target_date")
          op = dt.date.fromisoformat(op_str)
          if op != asof:
              sys.exit(f"FAIL: manifest operational_target_date={op} != consumer asof={asof}")

          # Freshness: extfeed.post.max_ts_utc must reach asof close cutoff (BIST 17:00 TR = 14:00 UTC)
          mts_str = ext_post.get("max_ts_utc")
          if not mts_str:
              sys.exit("FAIL: manifest extfeed.post.max_ts_utc missing")
          mts = pd.Timestamp(mts_str)
          if mts.tzinfo is None:
              mts = mts.tz_localize("UTC")
          cutoff = pd.Timestamp(f"{asof.isoformat()}T14:00:00Z")
          if mts < cutoff:
              sys.exit(f"FAIL: extfeed max_ts_utc={mts.isoformat()} < asof close cutoff {cutoff.isoformat()}")

          # XU100 sha256 integrity (recompute on downloaded file)
          h2 = hashlib.sha256()
          with XU100.open("rb") as f:
              for chunk in iter(lambda: f.read(1 << 20), b""):
                  h2.update(chunk)
          xu_got_sha = h2.hexdigest()
          xu_want_sha = xu_post.get("sha256")
          if xu_got_sha != xu_want_sha:
              sys.exit(f"FAIL: xu100 sha mismatch (downloaded={xu_got_sha} manifest={xu_want_sha})")

          # XU100 row_count match
          xu_got_rows = pq.read_metadata(XU100).num_rows
          xu_want_rows = xu_post.get("row_count")
          if xu_got_rows != xu_want_rows:
              sys.exit(f"FAIL: xu100 row_count mismatch (downloaded={xu_got_rows} manifest={xu_want_rows})")

          # XU100 max_date == ASOF (manifest side)
          xu_md_str = xu_post.get("max_date")
          if not xu_md_str:
              sys.exit("FAIL: manifest xu100.post.max_date missing")
          xu_md = dt.date.fromisoformat(xu_md_str)
          if xu_md != asof:
              sys.exit(f"FAIL: manifest xu100.post.max_date={xu_md} != asof={asof}")

          # XU100 max_date == ASOF (downloaded parquet side)
          xu_df = pd.read_parquet(XU100)
          if isinstance(xu_df.index, pd.DatetimeIndex) and len(xu_df.index) > 0:
              xu_dl_max = xu_df.index.max()
          elif "Date" in xu_df.columns:
              xu_dl_max = pd.to_datetime(xu_df["Date"]).max()
          elif "date" in xu_df.columns:
              xu_dl_max = pd.to_datetime(xu_df["date"]).max()
          else:
              sys.exit("FAIL: xu100 parquet has no DatetimeIndex / Date / date column")
          if pd.isna(xu_dl_max):
              sys.exit("FAIL: xu100 parquet max_date is NaT")
          xu_dl_md = pd.Timestamp(xu_dl_max).date()
          if xu_dl_md != asof:
              sys.exit(f"FAIL: xu100 parquet max_date={xu_dl_md} != asof={asof}")

          print("  master-data restore OK:")
          print(f"    mode={m['mode']} verdict={m['verdict']} freshness={m['freshness_status']}")
          print(f"    operational_target_date={op} asof={asof}")
          print(f"    extfeed rows={got_rows:,} max_ts_utc={mts.isoformat()}")
          print(f"    extfeed sha256={got_sha[:16]}…")
          print(f"    xu100   rows={xu_got_rows:,} max_date={xu_dl_md}")
          print(f"    xu100   sha256={xu_got_sha[:16]}…")
          PYEOF

      - name: Run horizontal_base live scanner
        run: |
          set -o pipefail
          python -m tools.horizontal_base_scan_live \
            --asof "${{ steps.resolve_date.outputs.asof }}" \
            2>&1 | tee horizontal_base_scan.txt | tail -80

      - name: Build HTML report
        run: |
          set -o pipefail
          python -m tools.horizontal_base_html \
            --asof "${{ steps.resolve_date.outputs.asof }}" \
            --also-latest \
            2>&1 | tee horizontal_base_html.txt

      - name: Push HTML to GitHub Pages
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
        run: |
          if [ -z "$GH_TOKEN" ] || [ -z "$GH_PAGES_REPO" ]; then
            echo "  ⚠ GH_TOKEN / GH_PAGES_REPO yok — Pages push atlandı"
            exit 0
          fi
          python - <<'PYEOF'
          import os, pathlib, sys
          sys.path.insert(0, os.getcwd())
          from core.reports import push_html_to_github
          html = pathlib.Path("output/horizontal_base_scan_latest.html").read_text(encoding="utf-8")
          url = push_html_to_github(html, "horizontal_base_scan.html", "horizontal-base-latest")
          print(f"  ✓ published: {url}")
          PYEOF

      - name: Telegram notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
        run: |
          python - <<'PYEOF'
          import os, json, sys, pathlib, re, html as h, requests

          asof = "${{ steps.resolve_date.outputs.asof }}"
          repo = os.environ.get("GH_PAGES_REPO", "")
          page_url = ""
          if repo:
              owner, name = repo.split("/")
              page_url = f"https://{owner}.github.io/{name}/horizontal_base_scan.html"

          html_path = pathlib.Path("output/horizontal_base_scan_latest.html")
          data = {}
          if html_path.exists():
              raw = html_path.read_text(encoding="utf-8")
              m = re.search(r'<script id="horizontal-base-live-data"[^>]*>(.*?)</script>', raw, re.S)
              if m:
                  try:
                      data = json.loads(m.group(1))
                  except Exception:
                      data = {}

          tier_summaries = data.get("tier_summaries", {})
          n_total = data.get("n_total", 0)
          n_trd_a = data.get("n_tradeable_a", 0)
          n_trd_ab = data.get("n_tradeable_ab", 0)
          n_trig = data.get("n_trigger", 0)
          n_ret = data.get("n_retest_bounce", 0)
          n_ext = data.get("n_extended", 0)

          def _fmt_list(tickers, cap=10):
              if not tickers:
                  return "—"
              shown = tickers[:cap]
              extra = len(tickers) - len(shown)
              s = ", ".join(h.escape(t) for t in shown)
              if extra > 0:
                  s += f" <i>(+{extra})</i>"
              return s

          body = [
              f"📐 <b>Horizontal Base · LIVE</b> · {asof}",
              "",
              f"N <b>{n_total}</b> · trigger <b>{n_trig}</b> · retest <b>{n_ret}</b> · extended <b>{n_ext}</b>",
              f"Tradeable A <b>{n_trd_a}</b> · AB <b>{n_trd_ab}</b>",
          ]
          for tier in ["A", "B", "C"]:
              s = tier_summaries.get(tier, {})
              if not s:
                  continue
              n_t = s.get("n_total", 0)
              n_a = s.get("n_tradeable_a", 0)
              n_ab = s.get("n_tradeable_ab", 0)
              body += ["", f"<b>Tier {tier}</b> · N <b>{n_t}</b> · "
                       f"tradeable A <b>{n_a}</b> / AB <b>{n_ab}</b>"]
              a_t = s.get("tradeable_a_tickers", [])
              ab_t = s.get("tradeable_ab_tickers", [])
              if a_t:
                  body.append(f"  🟢 A: {_fmt_list(a_t)}")
              if ab_t:
                  body.append(f"  🔵 AB: {_fmt_list(ab_t)}")
              if not a_t and not ab_t and n_t > 0:
                  body.append("  <i>(tradeable yok — extended/age>5/regime≠long|neutral)</i>")
          if page_url:
              body += ["", f'<a href="{page_url}">📰 HTML rapor</a>']
          body += ["", "⚠️ Descriptive scanner · ML v1+v1_2 REJECTED · trade-edge iddiası YOK"]
          msg = "\n".join(body)

          token = os.environ.get("TG_BOT_TOKEN", "")
          chat_id = os.environ.get("TG_CHAT_ID", "")
          if token and chat_id:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "text": msg[:4096],
                        "parse_mode": "HTML", "disable_web_page_preview": True},
              )
              print(f"  Telegram: {r.status_code}")
          else:
              print("  ℹ TG creds yok, mesaj:")
              print(msg)
          PYEOF

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizontal-base-${{ steps.resolve_date.outputs.asof }}-${{ github.run_number }}
          path: |
            horizontal_base_scan.txt
            horizontal_base_html.txt
            output/horizontal_base_live_*.csv
            output/horizontal_base_live_*.parquet
            output/horizontal_base_scan_*.html
          if-no-files-found: warn
          retention-days: 14
