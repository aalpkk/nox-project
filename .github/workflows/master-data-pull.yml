name: master data pull

concurrency:
  group: master-data-pull-${{ github.ref }}-${{ github.event.inputs.mode || (github.event.schedule == '30 15 * * 1-5' && 'close' || 'intraday_1700') }}
  cancel-in-progress: false

on:
  # Scheduled producer fires. Two schedules in one workflow:
  #
  # intraday_1700 (three slots 17:10/17:20/17:30 TR) — SBT-1700 consumer
  # prerequisite. Fires after BIST 16:00–17:00 hourly bar closes at 17:00
  # TR, giving the 1h extfeed enough time to publish the 14:00 UTC bar
  # before the orchestrator pulls. Multiple slots absorb GitHub Actions
  # cron skew/skips.
  #
  # close (single slot 18:30 TR) — DE v1 close-consumer prerequisite
  # (PR-DE-0). Fires after BIST 18:00 daily close so fintables + xu100
  # daily closes are published. Single slot today; if cron skew proves
  # disruptive, additional slots (40/50 15) can be added in a follow-up.
  #
  # Concurrency group serializes fires within each mode (close-cron,
  # close-dispatch, intraday-cron, intraday-dispatch each share a group).
  # Modes run in parallel. delta_pull is idempotent, so duplicate fires
  # within a mode are harmless.
  schedule:
    - cron: '10 14 * * 1-5'   # 17:10 TR  intraday_1700
    - cron: '20 14 * * 1-5'   # 17:20 TR  intraday_1700
    - cron: '30 14 * * 1-5'   # 17:30 TR  intraday_1700
    - cron: '30 15 * * 1-5'   # 18:30 TR  close (PR-DE-0)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pull mode: intraday_1700 (extfeed only) | close (extfeed + fintables + xu100)'
        required: true
        type: choice
        options:
          - intraday_1700
          - close
      target_date:
        description: 'Operational target date (YYYY-MM-DD). Leave blank to use Europe/Istanbul today (weekend pulls back to Friday).'
        required: false
        default: ''

jobs:
  master-data-pull:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run orchestrator
        id: run
        env:
          INTRADAY_SID: ${{ secrets.INTRADAY_SID }}
          INTRADAY_SIGN: ${{ secrets.INTRADAY_SIGN }}
          INTRADAY_HOST: ${{ secrets.INTRADAY_HOST }}
          INTRADAY_WS_URL: ${{ secrets.INTRADAY_WS_URL }}
        run: |
          set -euo pipefail
          MODE='${{ github.event.inputs.mode }}'
          # workflow_dispatch sets MODE; cron fires leave it empty.
          # On cron, resolve from the schedule cron string: '30 15 * * 1-5'
          # → close, all others (10/20/30 14) → intraday_1700.
          if [ -z "$MODE" ]; then
            case '${{ github.event.schedule }}' in
              '30 15 * * 1-5')
                MODE=close
                ;;
              *)
                MODE=intraday_1700
                ;;
            esac
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          TARGET='${{ github.event.inputs.target_date }}'
          if [ -n "$TARGET" ]; then
            python tools/master_data_pull_orchestrator.py --mode "$MODE" --target-date "$TARGET"
          else
            python tools/master_data_pull_orchestrator.py --mode "$MODE"
          fi

      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-data-manifest
          path: output/master_data_manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload extfeed master
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-extfeed-intraday-1h
          path: output/extfeed_intraday_1h_3y_master.parquet
          if-no-files-found: error
          retention-days: 30

      - name: Upload fintables master
        if: ${{ always() && steps.run.outputs.mode == 'close' }}
        uses: actions/upload-artifact@v4
        with:
          name: master-ohlcv-fintables
          path: output/ohlcv_10y_fintables_master.parquet
          if-no-files-found: warn
          retention-days: 30

      - name: Upload xu100 daily
        if: ${{ always() && steps.run.outputs.mode == 'close' }}
        uses: actions/upload-artifact@v4
        with:
          name: master-xu100-extfeed-daily
          path: output/xu100_extfeed_daily.parquet
          if-no-files-found: error
          retention-days: 30
