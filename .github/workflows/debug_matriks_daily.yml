name: Debug — Matriks daily history probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Probe historicalData param variants
        env:
          MATRIKS_API_KEY: ${{ secrets.MATRIKS_API_KEY }}
          MATRIKS_CLIENT_ID: ${{ secrets.MATRIKS_CLIENT_ID }}
          MATRIKS_TIMEOUT: '120'
        run: |
          python - <<'PYEOF'
          from agent.matriks_client import MatriksClient
          cli = MatriksClient()
          variants = [
              ("no_interval_6y",  {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","rawBars":True}),
              ("interval_daily_6y",  {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","rawBars":True,"interval":"daily"}),
              ("interval_daily_1y",  {"symbol":"GARAN","startDate":"2025-04-25","endDate":"2026-04-24","rawBars":True,"interval":"daily"}),
              ("interval_daily_3m",  {"symbol":"GARAN","startDate":"2026-01-25","endDate":"2026-04-24","rawBars":True,"interval":"daily"}),
              ("interval_1day_6y",   {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","rawBars":True,"interval":"1day"}),
              ("interval_D_6y",      {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","rawBars":True,"interval":"D"}),
              ("interval_daily_barCount2000",  {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","rawBars":True,"interval":"daily","barCount":2000}),
              ("interval_daily_limit2000",     {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","rawBars":True,"interval":"daily","limit":2000}),
              ("interval_daily_count2000",     {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","rawBars":True,"interval":"daily","count":2000}),
              ("interval_weekly_6y",  {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","rawBars":True,"interval":"weekly"}),
          ]
          for label, args in variants:
              try:
                  resp = cli.call_tool("historicalData", args)
              except Exception as exc:
                  print(f"  {label}: EXC {type(exc).__name__}: {exc}")
                  continue
              if not isinstance(resp, dict):
                  print(f"  {label}: non-dict {type(resp).__name__}")
                  continue
              keys = list(resp.keys())
              bars = resp.get("allBars") or resp.get("bars") or resp.get("rawBars") or []
              fd = ld = None
              if bars and isinstance(bars[0], dict):
                  fd = bars[0].get("date") or bars[0].get("d") or bars[0].get("timestamp")
                  ld = bars[-1].get("date") or bars[-1].get("d") or bars[-1].get("timestamp")
              print(f"  {label}: bars={len(bars)} first={fd} last={ld} keys={keys[:8]}")
          PYEOF
