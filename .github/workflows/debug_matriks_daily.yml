name: Debug — Matriks daily history probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Probe historicalData param variants
        env:
          MATRIKS_API_KEY: ${{ secrets.MATRIKS_API_KEY }}
          MATRIKS_CLIENT_ID: ${{ secrets.MATRIKS_CLIENT_ID }}
          MATRIKS_TIMEOUT: '120'
        run: |
          python - <<'PYEOF'
          from agent.matriks_client import MatriksClient
          cli = MatriksClient()
          # Daily endpoint hard-caps allBars at 60 — try period/sampling/raw flags
          variants = [
              ("period_5Y",   {"symbol":"GARAN","interval":"daily","rawBars":True,"period":"5Y"}),
              ("period_1Y",   {"symbol":"GARAN","interval":"daily","rawBars":True,"period":"1Y"}),
              ("period_MAX",  {"symbol":"GARAN","interval":"daily","rawBars":True,"period":"MAX"}),
              ("period_max",  {"symbol":"GARAN","interval":"daily","rawBars":True,"period":"max"}),
              ("period_ALL",  {"symbol":"GARAN","interval":"daily","rawBars":True,"period":"ALL"}),
              ("period_5y_lc", {"symbol":"GARAN","interval":"daily","rawBars":True,"period":"5y"}),
              ("sampling_off",{"symbol":"GARAN","interval":"daily","rawBars":True,"period":"5Y","sampling":False}),
              ("sampling_none",{"symbol":"GARAN","interval":"daily","rawBars":True,"period":"5Y","sampling":"none"}),
              ("downsample_false",{"symbol":"GARAN","interval":"daily","rawBars":True,"period":"5Y","downsample":False}),
              ("startDate_period_5Y", {"symbol":"GARAN","startDate":"2020-04-25","endDate":"2026-04-24","interval":"daily","rawBars":True,"period":"5Y"}),
          ]
          for label, args in variants:
              try:
                  resp = cli.call_tool("historicalData", args)
              except Exception as exc:
                  print(f"  {label}: EXC {type(exc).__name__}: {exc}")
                  continue
              if not isinstance(resp, dict):
                  print(f"  {label}: non-dict {type(resp).__name__}")
                  continue
              keys = list(resp.keys())
              bars = resp.get("allBars") or resp.get("bars") or resp.get("rawBars") or []
              fd = ld = None
              if bars and isinstance(bars[0], dict):
                  fd = bars[0].get("date") or bars[0].get("d") or bars[0].get("timestamp")
                  ld = bars[-1].get("date") or bars[-1].get("d") or bars[-1].get("timestamp")
              print(f"  {label}: bars={len(bars)} first={fd} last={ld} keys={keys[:8]}")
          PYEOF
