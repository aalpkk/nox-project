name: Test Matriks tools up
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python tools/test_matriks_tools_up.py
        env:
          MATRIKS_API_KEY: ${{ secrets.MATRIKS_API_KEY }}
          MATRIKS_CLIENT_ID: ${{ secrets.MATRIKS_CLIENT_ID }}
