name: NYX Alpha Scan
on:
  schedule:
    - cron: '30 15 * * 1-5'  # 18:30 TR ‚ÄĒ BIST kapanńĪŇü sonrasńĪ
  workflow_dispatch:
    inputs:
      mode:
        description: 'Data source (cache=Fintables parquet, live=yfinance)'
        type: choice
        options: [cache, live]
        default: cache
      cutoff:
        description: 'Cutoff date YYYY-MM-DD (boŇü = bug√ľn veya parquet son bar)'
        type: string
        default: ''

concurrency:
  group: nyx-alpha
  cancel-in-progress: true

jobs:
  alpha-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Restore YF price cache
        uses: actions/cache@v4
        with:
          path: |
            output/yf_price_cache.parquet
            output/yf_xu100_cache.parquet
          key: alpha-cache-${{ github.run_number }}
          restore-keys: |
            alpha-cache-

      - name: Run Alpha Scan (Fintables 607-universe)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
          SCAN_MODE: ${{ github.event.inputs.mode || 'live' }}
          SCAN_CUTOFF: ${{ github.event.inputs.cutoff || '' }}
        run: |
          ARGS="--mode $SCAN_MODE --push"
          if [ -n "$SCAN_CUTOFF" ]; then
            ARGS="$ARGS --cutoff $SCAN_CUTOFF"
          fi
          echo "Running: python scan_alpha_fintables.py $ARGS"
          python scan_alpha_fintables.py $ARGS 2>&1 | tee alpha_output.txt

      - name: Send Telegram notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import os, re, requests

          with open("alpha_output.txt", "r") as f:
              raw = f.read()

          m_n = re.search(r"(\d+) aday", raw)
          n_cand = m_n.group(1) if m_n else "?"
          m_cut = re.search(r"cutoff=(\S+)", raw)
          cutoff = m_cut.group(1) if m_cut else "?"

          # Markowitz
          m_pf = re.search(
              r"Markowitz 4'l√ľ:\s*Sharpe\s+([\d.]+)\s*\|\s*([+\-][\d.]+)%\s*@\s*([\d.]+)%",
              raw,
          )
          pf_line = ""
          if m_pf:
              pf_line = f"Sharpe {m_pf.group(1)} | {m_pf.group(2)}% @ {m_pf.group(3)}% risk"

          # Top 4 weights
          weights = re.findall(r"^\s{4}(\S+)\s+([\d.]+)%", raw, re.MULTILINE)

          msg = f"ūüéĮ <b>NYX Alpha Scan</b> ¬∑ {cutoff}\n\n"
          msg += f"ūüďä {n_cand} aday\n"
          if pf_line:
              msg += f"ūüíľ <b>Markowitz 4:</b> {pf_line}\n<pre>"
              for t, w in weights[:4]:
                  msg += f"{t:<8} {w}%\n"
              msg += "</pre>\n"
          msg += "\nūüĒó https://aalpkk.github.io/nox-signals/alpha_scan.html"

          token = os.environ.get("TG_BOT_TOKEN", "")
          chat_id = os.environ.get("TG_CHAT_ID", "")
          if token and chat_id:
              resp = requests.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "text": msg[:4096],
                        "parse_mode": "HTML", "disable_web_page_preview": True},
              )
              print(f"Telegram: {resp.status_code}")
          else:
              print("TG creds yok")
              print(msg)
          PYEOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alpha-scan-${{ github.run_number }}
          path: |
            alpha_output.txt
            output/alpha_scan_fintables_*.html
            output/alpha_scan_fintables_*.csv
