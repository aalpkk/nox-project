name: nyxexpansion Daily Scan
on:
  schedule:
    - cron: '25 14 * * 1-5'  # 17:25 TR — live retention run (right after 17:00 cutoff)
    - cron: '5 15 * * 1-5'   # 18:05 TR — post-close final scan
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), boş = dataset max'
        required: false
        default: ''

concurrency:
  group: nyxexp-daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Fintables token health probe
        env:
          FINTABLES_MCP_TOKEN: ${{ secrets.FINTABLES_MCP_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import os, requests

          token = os.environ.get("FINTABLES_MCP_TOKEN", "")
          if not token:
              print("  ℹ FINTABLES_MCP_TOKEN unset — Matriks/yfinance fallback only")
              raise SystemExit(0)
          payload = {
              "jsonrpc": "2.0", "id": 1, "method": "initialize",
              "params": {"protocolVersion": "2024-11-05", "capabilities": {},
                         "clientInfo": {"name": "nox-token-probe", "version": "1.0"}},
          }
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json, text/event-stream",
          }
          try:
              r = requests.post("https://evo.fintables.com/mcp",
                                json=payload, headers=headers, timeout=15)
          except Exception as exc:
              print(f"  ⚠ probe network error: {exc}")
              raise SystemExit(0)
          print(f"  Fintables MCP probe status: {r.status_code}")
          if r.status_code in (401, 403):
              tg_token = os.environ.get("TG_BOT_TOKEN", "")
              chat_id = os.environ.get("TG_CHAT_ID", "")
              msg = (
                  "⚠️ <b>Fintables MCP token EXPIRED / UNAUTHORIZED</b>\n\n"
                  f"Status: {r.status_code}\n\n"
                  "Mac'te Claude Code → Fintables MCP'yi yeniden auth'la, "
                  "yeni accessToken'ı keychain'den al, "
                  "<code>gh secret set FINTABLES_MCP_TOKEN</code> ile güncelle. "
                  "Bu turda Fintables tier atlandı, Matriks fallback devrede."
              )
              if tg_token and chat_id:
                  requests.post(
                      f"https://api.telegram.org/bot{tg_token}/sendMessage",
                      json={"chat_id": chat_id, "text": msg, "parse_mode": "HTML"},
                  )
                  print("  ✓ Telegram alerted")
              else:
                  print(msg)
          PYEOF

      - name: Phase 1 — scan_latest (produces candidate parquet)
        run: |
          set -o pipefail
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python -m nyxexpansion.tools.scan_latest \
            --dataset output/nyxexp_dataset_v4.parquet \
            --top 30 $DATE_ARG 2>&1 | tee scan_latest_output.txt

      - name: Phase 2 — fetch layered intraday (Fintables → extfeed → Matriks → yfinance)
        env:
          FINTABLES_MCP_TOKEN: ${{ secrets.FINTABLES_MCP_TOKEN }}
          INTRADAY_SID: ${{ secrets.INTRADAY_SID }}
          INTRADAY_SIGN: ${{ secrets.INTRADAY_SIGN }}
          INTRADAY_HOST: ${{ secrets.INTRADAY_HOST }}
          INTRADAY_WS_URL: ${{ secrets.INTRADAY_WS_URL }}
          MATRIKS_API_KEY: ${{ secrets.MATRIKS_API_KEY }}
        run: |
          set -o pipefail
          if [ -n "${{ github.event.inputs.date }}" ]; then
            TARGET="${{ github.event.inputs.date }}"
          else
            TARGET=$(TZ=Europe/Istanbul date +%Y-%m-%d)
          fi
          SCAN_PARQUET="output/nyxexp_scan_$(echo $TARGET | tr -d '-').parquet"
          if [ ! -f "$SCAN_PARQUET" ]; then
            echo "  ⚠ scan parquet $SCAN_PARQUET not found — fetch_layered skipped"
            exit 0
          fi
          python -m nyxexpansion.intraday.fetch_layered \
            --date "$TARGET" --tickers-from "$SCAN_PARQUET" \
            2>&1 | tee fetch_layered_output.txt

      - name: Phase 3 — retention stage + Markowitz + HTML
        run: |
          set -o pipefail
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python -m nyxexpansion.scan.run \
            --dataset output/nyxexp_dataset_v4.parquet \
            --top 30 \
            --mk-universe-top 15 \
            --skip-scan \
            $DATE_ARG 2>&1 | tee nyxexp_scan_output.txt

      - name: Push HTML to GitHub Pages
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
        run: |
          if [ -z "$GH_TOKEN" ] || [ -z "$GH_PAGES_REPO" ]; then
            echo "  ⚠ GH_TOKEN / GH_PAGES_REPO yok — Pages push atlandı"
            exit 0
          fi
          python - <<'PYEOF'
          import os, pathlib, sys
          sys.path.insert(0, os.getcwd())
          try:
              from core.reports import push_html_to_github
              html = pathlib.Path("output/nyxexp_scan_latest.html").read_text(encoding="utf-8")
              url = push_html_to_github(html, "nyxexp_scan.html", "latest")
              print(f"  ✓ published: {url}")
          except Exception as e:
              print(f"  ⚠ push failed: {e}")
          PYEOF

      - name: Telegram notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import os, re, requests

          try:
              with open("nyxexp_scan_output.txt") as f:
                  raw = f.read()
          except FileNotFoundError:
              raw = ""

          m_target = re.search(r"target\s*:\s*(\S+)", raw)
          target = m_target.group(1) if m_target else "?"
          m_n = re.search(r"scan output:\s*(\d+)\s*candidate", raw)
          n_cand = m_n.group(1) if m_n else "?"

          m_pf = re.search(r"sharpe=([\d.]+)\s+ret=([+\-][\d.]+)%\s+risk=([\d.]+)%", raw)
          pf_line = ""
          weights_block = ""
          if m_pf:
              pf_line = f"Sharpe {m_pf.group(1)} · {m_pf.group(2)}% @ {m_pf.group(3)}%"
              weights = re.findall(r"^\s{4}(\S+)\s+([\d.]+)%", raw, re.MULTILINE)
              if weights:
                  weights_block = "<pre>" + "\n".join(f"{t:<8} {w}%" for t, w in weights[:4]) + "</pre>"

          m_src = re.search(r"bars source breakdown:\s*([^\n]+)", raw)
          src_line = f"📡 {m_src.group(1).strip()}\n" if m_src else ""

          m_ret = re.search(r"PASS \(rank ≤ \d+\):\s*(\d+)\s+DROP:\s*(\d+)\s+unscored:\s*(\d+)", raw)
          ret_line = ""
          if m_ret:
              ret_line = f"🛡 PASS={m_ret.group(1)} · DROP={m_ret.group(2)} · unscored={m_ret.group(3)}\n"

          msg = f"🎯 <b>nyxexpansion Scan</b> · {target}\n\n"
          msg += f"📊 {n_cand} aday\n"
          msg += ret_line
          msg += src_line
          if pf_line:
              msg += f"💼 <b>4'lü Portföy:</b> {pf_line}\n{weights_block}\n"
          msg += "\n⚠️ daily candidate ranker — auto-entry değil"

          token = os.environ.get("TG_BOT_TOKEN", "")
          chat_id = os.environ.get("TG_CHAT_ID", "")
          if token and chat_id:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "text": msg[:4096],
                        "parse_mode": "HTML", "disable_web_page_preview": True},
              )
              print(f"  Telegram: {r.status_code}")
          else:
              print("  ℹ TG creds yok, mesaj:")
              print(msg)
          PYEOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nyxexp-scan-${{ github.run_number }}
          path: |
            scan_latest_output.txt
            fetch_layered_output.txt
            nyxexp_scan_output.txt
            output/nyxexp_scan_*.html
            output/nyxexp_scan_*.parquet
            output/nyxexp_intraday_master.parquet
            output/nyxexp_retention_log.csv
