name: NOX Agent Briefing
on:
  schedule:
    - cron: '45 16 * * 1-5'  # 19:45 TR — SBT deploy sonrası
  workflow_dispatch:  # Manuel tetikleme

concurrency:
  group: nox-briefing
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      # yfinance cache — run'lar arasında parquet dosyalarını koru
      - name: Restore YF price cache
        uses: actions/cache@v4
        with:
          path: |
            output/yf_price_cache.parquet
            output/yf_xu100_cache.parquet
            output/matriks_cache.json
          key: nox-cache-${{ github.run_number }}
          restore-keys: |
            nox-cache-

      # Sinyaller artık GitHub Pages HTML'lerden okunuyor (tek kaynak)
      # Artifact download'a gerek yok

      # Faz 1: Ön analiz shortlist — Matriks kurumsal + sinyal listesi
      - name: Send shortlist (Phase 1)
        run: python -u -m agent.briefing --shortlist --notify
        timeout-minutes: 45
        env:
          PYTHONUNBUFFERED: "1"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
          GH_PAGES_BASE_URL: "https://aalpkk.github.io/nox-signals"
          BIST_PAGES_BASE_URL: "https://aalpkk.github.io/bist-signals"
          ML_SCORING_ENABLED: "1"
          BREAKOUT_ML_ENABLED: "1"
          MATRIKS_ENABLED: "1"
          MATRIKS_API_KEY: ${{ secrets.MATRIKS_API_KEY }}
          MATRIKS_CLIENT_ID: ${{ secrets.MATRIKS_CLIENT_ID }}
          MATRIKS_TIMEOUT: "1800"

      # Faz 2: Tam brifing — makro + AI analiz + HTML rapor
      - name: Generate full briefing (Phase 2)
        run: python -u -m agent.briefing --notify
        timeout-minutes: 45
        env:
          PYTHONUNBUFFERED: "1"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAGES_REPO: ${{ secrets.GH_PAGES_REPO }}
          GH_PAGES_BASE_URL: "https://aalpkk.github.io/nox-signals"
          BIST_PAGES_BASE_URL: "https://aalpkk.github.io/bist-signals"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ML_SCORING_ENABLED: "1"
          BREAKOUT_ML_ENABLED: "1"
          MATRIKS_ENABLED: "1"
          MATRIKS_API_KEY: ${{ secrets.MATRIKS_API_KEY }}
          MATRIKS_CLIENT_ID: ${{ secrets.MATRIKS_CLIENT_ID }}
          MATRIKS_TIMEOUT: "1800"

      - uses: actions/upload-artifact@v4
        with:
          name: briefing-${{ github.run_number }}
          path: |
            output/nox_briefing_*.html
