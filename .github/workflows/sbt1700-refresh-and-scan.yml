name: SBT-1700 — Refresh 5d dataset + Scan

# One-shot manual chain:
#   1. Pull fresh extfeed 1h master (cached between runs).
#   2. Rebuild output/sbt_1700_dataset_5d_intraday_v1.parquet for the
#      requested signal-date (default = today TR).
#   3. Commit the rebuilt 5d parquet to main.
#   4. Dispatch sbt1700-scan-live for the same date.
#
# Use this when the on-disk 5d dataset is missing the target signal-day.

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Signal-date (YYYY-MM-DD). Blank = today TR.'
        required: false
        default: ''
      full_pull:
        description: 'Force fresh extfeed master pull (slow, ~40 min).'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
  # Daily auto-fire at 17:05 TR (Mon–Fri). With cache restored from the
  # prior run, phase1 is a no-op and only delta_pull (~6 min) + build
  # (~1 min) + scan dispatch actually run, so the published HTML lands
  # ~17:15 TR — well before BIST 18:00 close.
  schedule:
    - cron: '5 14 * * 1-5'

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Resolve signal date
        id: resolve_date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            DATE=$(TZ='Europe/Istanbul' date +%Y-%m-%d)
          fi
          echo "signal_date=$DATE" >> $GITHUB_OUTPUT
          echo "Signal date: $DATE"

      - name: Restore extfeed master cache
        id: cache_master
        uses: actions/cache@v4
        with:
          path: output/extfeed_intraday_1h_3y_master.parquet
          key: extfeed-intraday-1h-master-v1

      - name: Pull extfeed 1h master (full or resume)
        env:
          INTRADAY_SID: ${{ secrets.INTRADAY_SID }}
          INTRADAY_SIGN: ${{ secrets.INTRADAY_SIGN }}
          INTRADAY_HOST: ${{ secrets.INTRADAY_HOST }}
          INTRADAY_WS_URL: ${{ secrets.INTRADAY_WS_URL }}
        run: |
          set -o pipefail
          if [ "${{ github.event.inputs.full_pull }}" = "true" ]; then
            python tools/extfeed_phase1_bulk.py --force 2>&1 | tail -200
          else
            python tools/extfeed_phase1_bulk.py 2>&1 | tail -200
          fi

      - name: Delta-pull last 4 days for all tickers
        env:
          INTRADAY_SID: ${{ secrets.INTRADAY_SID }}
          INTRADAY_SIGN: ${{ secrets.INTRADAY_SIGN }}
          INTRADAY_HOST: ${{ secrets.INTRADAY_HOST }}
          INTRADAY_WS_URL: ${{ secrets.INTRADAY_WS_URL }}
        run: |
          set -o pipefail
          python tools/extfeed_delta_pull.py 2>&1 | tail -100

      - name: Build SBT-1700 5d dataset
        run: |
          set -o pipefail
          python -m sbt1700.build_dataset_5d \
            --end "${{ steps.resolve_date.outputs.signal_date }}" \
            --validate 2>&1 | tail -100

      - name: Show 5d dataset coverage
        run: |
          python - <<'PY'
          import pandas as pd
          df = pd.read_parquet("output/sbt_1700_dataset_5d_intraday_v1.parquet", columns=["date"])
          print(f"5d dataset: rows={len(df):,} "
                f"date_min={df['date'].min()} date_max={df['date'].max()}")
          PY

      - name: Commit refreshed 5d dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f output/sbt_1700_dataset_5d_intraday_v1.parquet \
                     output/sbt_1700_dataset_5d_intraday_v1.meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(sbt1700): refresh 5d dataset → ${{ steps.resolve_date.outputs.signal_date }}"
            git push
          fi

      - name: Dispatch sbt1700-scan-live
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run sbt1700-scan-live.yml \
            --ref main \
            -f date="${{ steps.resolve_date.outputs.signal_date }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbt1700-refresh-${{ github.run_number }}
          path: |
            output/sbt_1700_dataset_5d_intraday_v1.parquet
            output/sbt_1700_dataset_5d_intraday_v1.meta.json
            output/extfeed_intraday_coverage.csv
          if-no-files-found: warn
          retention-days: 14
