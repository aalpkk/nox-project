name: List Matriks Tools
on: workflow_dispatch
jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python tools/list_matriks_tools.py
        env:
          MATRIKS_API_KEY: ${{ secrets.MATRIKS_API_KEY }}
          MATRIKS_CLIENT_ID: ${{ secrets.MATRIKS_CLIENT_ID }}
